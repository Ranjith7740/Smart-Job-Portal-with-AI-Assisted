<div class="container">

  <h2>Available Jobs</h2>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <mat-card *ngFor="let job of jobs" class="job-card">

    <mat-card-title>{{ job.title }}</mat-card-title>

    <mat-card-content>
      <p><strong>Skills:</strong> {{ job.requiredSkills }}</p>
      <p>{{ job.description | slice:0:150 }}...</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button
        color="primary"
        [routerLink]="['/job-seeker/jobs', job.id]">View Details</button>

    </mat-card-actions>

  </mat-card>

  <div class="pagination">
    <button mat-button (click)="prevPage()" [disabled]="page === 0">
      Previous
    </button>

    <span>Page {{ page + 1 }} of {{ totalPages }}</span>

    <button mat-button
            (click)="nextPage()"
            [disabled]="page === totalPages - 1">
      Next
    </button>
  </div>

</div>
