<div class="container">

  <div class="header">
    <h2>Recruiter Dashboard</h2>

    <button mat-raised-button
            color="primary"
            routerLink="/recruiter/create-job">
      + Create Job
    </button>
  </div>

  <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

  <mat-card *ngFor="let job of jobs" class="job-card">

    <mat-card-title>
      {{ job.title }}
    </mat-card-title>

    <mat-card-content>
      <p><strong>Skills:</strong> {{ job.requiredSkills }}</p>
      <p>{{ job.description | slice:0:120 }}...</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button
              color="primary"
              [routerLink]="['/recruiter/jobs', job.id, 'candidates']">
        View Candidates
      </button>
    </mat-card-actions>

  </mat-card>

  <p *ngIf="!loading && jobs.length === 0">
    You haven’t posted any jobs yet.
  </p>

  <p class="error" *ngIf="error">{{ error }}</p>

</div>
